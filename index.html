<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Pokemon Sealed Lot Comp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1623;
  --surface:  #1a2236;
  --surface2: #202d45;
  --border:   #2e3f5c;
  --gold:     #fbbf24;
  --gold-dim: #b45309;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --green:    #6ee7b7;
  --blue:     #93c5fd;
  --orange:   #fdba74;
  --red:      #f87171;
  --red-dim:  #7f1d1d;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  padding: 28px 24px 60px;
}

/* ── Header ──────────────────────────────────────────── */
.app-header { text-align: center; margin-bottom: 28px; user-select: none; }
.app-header h1 {
  font-size: 2rem; font-weight: 800; color: var(--gold);
  letter-spacing: 1.5px; text-shadow: 0 0 24px rgba(251,191,36,.25); margin-bottom: 5px;
}
.app-header p { color: var(--muted); font-size: 0.85rem; }

/* ── Toolbar ─────────────────────────────────────────── */
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 15px; border: none; border-radius: 6px;
  font-size: 0.8125rem; font-weight: 600; cursor: pointer;
  transition: background .12s, box-shadow .12s, transform .08s;
  white-space: nowrap; font-family: inherit; letter-spacing: .3px;
}
.btn:active { transform: translateY(1px); }
.btn-gold   { background: var(--gold); color: #111; }
.btn-gold:hover  { background: #fcd34d; box-shadow: 0 0 14px rgba(251,191,36,.4); }
.btn-blue   { background: #1e3a5f; color: var(--blue); border: 1px solid #2d527a; }
.btn-blue:hover  { background: #254a78; }
.btn-ghost  { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); border-color: #3d5478; }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #991b1b; }
.btn-danger:hover { background: #991b1b; }
#fileInput { display: none; }

/* ── Table ───────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto; border-radius: 10px;
  border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,.55);
}
table { width: 100%; border-collapse: collapse; background: var(--surface); }

/* ── thead ───────────────────────────────────────────── */
thead { background: #0a1020; }
thead tr { border-bottom: 2px solid var(--gold); }
thead th {
  padding: 10px 10px; text-align: left;
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .9px; color: var(--muted); white-space: nowrap;
}
thead th.pct-head { background: #0c1428; text-align: center; padding: 8px 6px; }

.pct-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.pct-inner .lbl-top { font-size: .62rem; color: var(--muted); }
.pct-inner .lbl-bot { font-size: .63rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }

.pct-input {
  width: 76px; padding: 4px 6px;
  background: #162040; border: 1px solid var(--gold-dim); border-radius: 5px;
  color: var(--gold); font-size: .9rem; font-weight: 800; text-align: center;
  font-family: inherit; transition: border-color .12s, box-shadow .12s;
}
.pct-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 8px rgba(251,191,36,.35); }

.rm-col-btn {
  background: transparent; border: 1px solid #3d1a1a;
  color: var(--muted); cursor: pointer; font-size: .72rem;
  padding: 1px 6px; border-radius: 3px; line-height: 1.4;
  font-family: inherit; transition: color .12s, background .12s, border-color .12s;
}
.rm-col-btn:hover { color: var(--red); background: var(--red-dim); border-color: var(--red); }

/* ── tbody ───────────────────────────────────────────── */
tbody tr:nth-child(even) { background: #17243a; }
tbody tr:nth-child(odd)  { background: var(--surface); }
tbody tr:hover           { background: #1d2f4a; }
tbody tr { transition: background .1s; }
tbody td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: .8125rem; }

/* ── Cell inputs ─────────────────────────────────────── */
.ci {
  background: transparent; border: 1px solid transparent;
  border-radius: 4px; color: var(--text); padding: 4px 6px;
  font-size: .8125rem; width: 100%; font-family: inherit;
  transition: border-color .12s, background .12s;
}
.ci:hover { border-color: var(--border); }
.ci:focus { outline: none; border-color: var(--gold-dim); background: rgba(251,191,36,.05); }
input[type=number].ci { -moz-appearance: textfield; }
input[type=number].ci::-webkit-outer-spin-button,
input[type=number].ci::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── Column sizing ───────────────────────────────────── */
.c-item  { min-width: 160px; }
.c-qty   { width: 68px; }
.c-price { width: 110px; }
.c-total { width: 112px; }
.c-pct   { width: 120px; text-align: center; }
.c-del   { width: 44px; text-align: center; }

/* ── Computed cells ──────────────────────────────────── */
.cv-total  { color: var(--green); font-weight: 700; }

.offer-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cv-offer   { color: var(--blue); font-weight: 600; font-size: .875rem; }
.cv-profit  { color: var(--orange); font-size: .72rem; font-weight: 600; }

/* ── Search PC button (inside price cell) ────────────── */
.c-price    { width: 140px; }
.price-cell { display: flex; flex-direction: column; gap: 3px; }
.fetch-btn  {
  background: var(--surface2); color: var(--blue);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; font-size: .72rem; font-weight: 600;
  cursor: pointer; font-family: inherit; align-self: flex-start;
  transition: background .12s, border-color .12s;
}
.fetch-btn:hover    { background: #1e3a5f; border-color: var(--blue); }
.fetch-btn:disabled { opacity: .5; cursor: default; }
.fetch-error { color: var(--orange); font-size: .68rem; line-height: 1.3; }

/* ── Delete button ───────────────────────────────────── */
.del-btn {
  background: transparent; border: 1px solid #3d1a1a;
  color: var(--red); padding: 3px 8px; border-radius: 4px;
  font-size: .75rem; cursor: pointer;
  transition: background .12s, border-color .12s; font-family: inherit;
}
.del-btn:hover { background: var(--red-dim); border-color: var(--red); }

/* ── tfoot ───────────────────────────────────────────── */
tfoot { background: #08101e; }
tfoot td { padding: 11px 8px; border-top: 2px solid var(--gold); font-weight: 700; font-size: .8125rem; }
.foot-lbl   { color: var(--gold); font-size: .72rem; text-transform: uppercase; letter-spacing: .6px; }
.foot-market { color: var(--green); font-size: 1.05rem; }
.foot-offer-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center; }
.foot-offer-val  { color: var(--blue); font-size: .95rem; }
.foot-profit-val { color: var(--orange); font-size: .75rem; font-weight: 600; }

/* ── Print / PDF styles ──────────────────────────────── */
@media print {
  body { background: #fff; color: #000; padding: 12px; font-size: 11px; }
  .toolbar, .app-header p, .del-btn, .search-btn, .fetch-error,
  .rm-col-btn, #hdr-del-anchor, .c-del { display: none !important; }
  .app-header h1 { color: #000; font-size: 1.2rem; text-shadow: none; margin-bottom: 4px; }
  .table-wrap { border: 1px solid #ccc; border-radius: 0; box-shadow: none; overflow: visible; }
  table { min-width: unset; width: 100%; border-collapse: collapse; background: #fff; }
  thead { background: #f0f0f0 !important; }
  thead tr { border-bottom: 2px solid #333; }
  thead th { color: #333; font-size: 9px; padding: 5px 6px; }
  thead th.pct-head { background: #e8e8e8 !important; }
  .pct-inner .lbl-top, .pct-inner .lbl-bot { color: #555; }
  .pct-input { background: transparent; border: none; color: #000; font-weight: 800; font-size: 11px; width: auto; padding: 0; }
  tbody tr:nth-child(even) { background: #f7f7f7 !important; }
  tbody tr:nth-child(odd)  { background: #fff !important; }
  tbody tr:hover           { background: inherit !important; }
  tbody td { padding: 4px 6px; border-bottom: 1px solid #ddd; font-size: 10px; }
  .ci { border: none; background: transparent; color: #000; padding: 0; font-size: 10px; }
  .cv-total  { color: #1a7a4a; }
  .cv-offer  { color: #1a4a8a; }
  .cv-profit { color: #8a4a00; }
  .offer-cell { gap: 1px; }
  tfoot { background: #f0f0f0 !important; }
  tfoot td { border-top: 2px solid #333; padding: 5px 6px; }
  .foot-lbl    { color: #333; }
  .foot-market { color: #1a7a4a; font-size: 11px; }
  .foot-offer-val  { color: #1a4a8a; font-size: 11px; }
  .foot-profit-val { color: #8a4a00; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>&#9889; Pokemon Sealed Lot Comp</h1>
  <p>Price sealed lots with live percentage-based offer columns &mdash; fully local &amp; private</p>
</div>

<div class="toolbar">
  <button class="btn btn-gold"  onclick="addRow()">&#43; Add Row</button>
  <button class="btn btn-blue"  onclick="addPctCol()">&#43; Add % Column</button>
  <button class="btn btn-ghost" onclick="saveSession()">&#128190; Save Session</button>
  <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">&#128194; Load Session</button>
  <button class="btn btn-ghost" onclick="exportPDF()">&#128202; Export PDF</button>
  <button class="btn btn-danger" onclick="clearAll()">&#128465; Clear All</button>
  <input type="file" id="fileInput" accept=".json" onchange="loadSession(event)">
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="headerRow">
        <th class="c-item">Item</th>
        <th class="c-qty">Qty</th>
        <th class="c-price">Market Price</th>
        <th class="c-total">Total</th>
        <!-- dynamic pct <th>s injected here -->
        <th class="c-del" id="hdr-del-anchor"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
    <tfoot>
      <tr id="footerRow">
        <td colspan="2"><div class="foot-lbl">&#931; Totals</div></td>
        <td></td>
        <td class="c-total"><div id="ft-market" class="foot-market">$0.00</div></td>
        <!-- dynamic pct <td>s injected here -->
        <td id="ftr-del-anchor"></td>
      </tr>
    </tfoot>
  </table>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
var rows      = [];
var nextId    = 1;
var nextColId = 4;
var pctCols   = [
  { id: 1, pct: 85 },
  { id: 2, pct: 75 },
  { id: 3, pct: 65 }
];

// ── Utilities ────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function fmt(n) {
  var v = parseFloat(n);
  if (!isFinite(v)) return '$0.00';
  var sign = v < 0 ? '-$' : '$';
  return sign + Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function rowTotal(row) {
  return (parseFloat(row.qty) || 0) * (parseFloat(row.price) || 0);
}

function offerVal(total, pct)  { return total * pct / 100; }
function profitVal(total, pct) { return total - offerVal(total, pct); }

function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function findCol(colId) {
  for (var i = 0; i < pctCols.length; i++) { if (pctCols[i].id === colId) return pctCols[i]; }
  return null;
}

function findRow(rowId) {
  for (var i = 0; i < rows.length; i++) { if (rows[i].id === rowId) return rows[i]; }
  return null;
}

// ── Build DOM pieces ─────────────────────────────────────────────────────────
function buildColTh(col) {
  var th = document.createElement('th');
  th.className = 'pct-head c-pct';
  th.setAttribute('data-colid', col.id);
  th.innerHTML =
    '<div class="pct-inner">' +
      '<span class="lbl-top">Offer at</span>' +
      '<input type="text" id="pct-' + col.id + '" class="pct-input" value="' + escHtml(col.pct) + '" oninput="onPctInput(' + col.id + ',this.value)">' +
      '<span class="lbl-bot">% col ' + col.id + '</span>' +
      '<button class="rm-col-btn" onclick="removePctCol(' + col.id + ')" title="Remove column">&times; remove</button>' +
    '</div>';
  return th;
}

function buildOfferTd(col, rowId) {
  var td = document.createElement('td');
  td.className = 'c-pct';
  td.setAttribute('data-colid', col.id);
  td.innerHTML =
    '<div class="offer-cell">' +
      '<span class="cv-offer"  id="offer-'  + col.id + '-' + rowId + '">$0.00</span>' +
      '<span class="cv-profit" id="profit-' + col.id + '-' + rowId + '">+$0.00</span>' +
    '</div>';
  return td;
}

function buildFootColTd(col) {
  var td = document.createElement('td');
  td.className = 'c-pct';
  td.setAttribute('data-colid', col.id);
  td.innerHTML =
    '<div class="foot-offer-cell">' +
      '<span class="foot-offer-val"  id="ft-offer-'  + col.id + '">$0.00</span>' +
      '<span class="foot-profit-val" id="ft-profit-' + col.id + '">+$0.00</span>' +
    '</div>';
  return td;
}

function buildRow(row) {
  var id = row.id;
  var tr = document.createElement('tr');
  tr.id  = 'row-' + id;
  tr.innerHTML =
    '<td class="c-item">' +
      '<input class="ci" type="text" value="' + escHtml(row.item) + '" placeholder="Item name\u2026" oninput="onText(' + id + ',\'item\',this.value)">' +
    '</td>' +
    '<td class="c-qty">' +
      '<input class="ci" type="number" value="' + escHtml(row.qty) + '" placeholder="0" min="0" oninput="onNum(' + id + ',\'qty\',this.value)">' +
    '</td>' +
    '<td class="c-price">' +
      '<div class="price-cell">' +
        '<input class="ci" type="number" value="' + escHtml(row.price) + '" placeholder="0.00" min="0" step="0.01" oninput="onNum(' + id + ',\'price\',this.value)">' +
        '<button class="fetch-btn" id="search-btn-' + id + '" style="display:' + (row.item ? 'inline-flex' : 'none') + ';" onclick="searchPrice(' + id + ')">Search PC</button>' +
        '<span class="fetch-error" id="search-err-' + id + '" style="display:none;"></span>' +
      '</div>' +
    '</td>' +
    '<td class="c-total cv-total" id="total-' + id + '">$0.00</td>' +
    '<td class="c-del"><button class="del-btn" onclick="deleteRow(' + id + ')">\u2715</button></td>';

  var delTd = tr.querySelector('.c-del');
  for (var i = 0; i < pctCols.length; i++) {
    tr.insertBefore(buildOfferTd(pctCols[i], id), delTd);
  }
  return tr;
}

// ── Update calculations ───────────────────────────────────────────────────────
function updateRowColCalc(rowId, colId) {
  var row = findRow(rowId);
  var col = findCol(colId);
  if (!row || !col) return;
  var t = rowTotal(row);
  var pct = parseFloat(col.pct) || 0;
  var oEl = el('offer-'  + colId + '-' + rowId);
  var pEl = el('profit-' + colId + '-' + rowId);
  if (oEl) oEl.textContent = fmt(offerVal(t, pct));
  if (pEl) pEl.textContent = '+' + fmt(profitVal(t, pct));
}

function updateRowCalcs(rowId) {
  var row = findRow(rowId);
  if (!row) return;
  var t = rowTotal(row);
  var tEl = el('total-' + rowId);
  if (tEl) tEl.textContent = fmt(t);
  for (var i = 0; i < pctCols.length; i++) updateRowColCalc(rowId, pctCols[i].id);
}

function updateTotals() {
  var tm = 0;
  for (var i = 0; i < rows.length; i++) tm += rowTotal(rows[i]);
  var ftm = el('ft-market');
  if (ftm) ftm.textContent = fmt(tm);

  for (var c = 0; c < pctCols.length; c++) {
    var col = pctCols[c];
    var pct = parseFloat(col.pct) || 0;
    var to  = 0;
    for (var r = 0; r < rows.length; r++) to += offerVal(rowTotal(rows[r]), pct);
    var oEl = el('ft-offer-'  + col.id);
    var pEl = el('ft-profit-' + col.id);
    if (oEl) oEl.textContent = fmt(to);
    if (pEl) pEl.textContent = '+' + fmt(tm - to);
  }
}

// ── Input handlers ────────────────────────────────────────────────────────────
function onText(id, field, value) {
  var row = findRow(id);
  if (row) row[field] = value;
  if (field === 'item') {
    var btn = el('search-btn-' + id);
    if (btn) btn.style.display = value.trim() ? 'inline-flex' : 'none';
  }
}

function onNum(id, field, value) {
  var row = findRow(id);
  if (row) row[field] = value;
  updateRowCalcs(id);
  updateTotals();
}

// CORS proxy — allorigins returns raw page content, swap URL if it goes down
// Format: https://api.allorigins.win/raw?url=ENCODED_TARGET_URL
var CORS_PROXY = 'https://api.allorigins.win/raw?url=';

async function searchPrice(rowId) {
  var row = findRow(rowId);
  if (!row || !row.item.trim()) return;

  var btn        = el('search-btn-' + rowId);
  var err        = el('search-err-' + rowId);
  var priceInput = document.querySelector('#row-' + rowId + ' td.c-price input');

  btn.textContent   = 'Searching\u2026';
  btn.disabled      = true;
  err.style.display = 'none';

  try {
    // Step 1: search PriceCharting by item name
    var searchUrl = 'https://www.pricecharting.com/search-products?q=' +
                    encodeURIComponent(row.item) + '&type=prices';
    console.log('[SearchPC] Step 1 — search URL:', searchUrl);

    var resp = await fetch(CORS_PROXY + encodeURIComponent(searchUrl));
    console.log('[SearchPC] Search response status:', resp.status);
    if (!resp.ok) throw new Error('Search HTTP ' + resp.status);

    var html = await resp.text();
    console.log('[SearchPC] Search HTML length:', html.length, '| First 300 chars:', html.slice(0, 300));

    var doc  = new DOMParser().parseFromString(html, 'text/html');

    // Find first product link — PriceCharting game pages all contain /game/ in the path
    var productHref = null;
    var links = doc.querySelectorAll('a[href*="/game/"]');
    console.log('[SearchPC] Links with /game/ found:', links.length);
    for (var i = 0; i < links.length; i++) {
      var txt = links[i].textContent.trim();
      if (txt.length > 0) {
        productHref = links[i].getAttribute('href');
        console.log('[SearchPC] First product link:', productHref, '| text:', txt);
        break;
      }
    }
    if (!productHref) throw new Error('No product links found — site may have returned a bot-check page');

    if (productHref.indexOf('http') !== 0)
      productHref = 'https://www.pricecharting.com' + productHref;

    // Step 2: fetch the product page and extract the price
    console.log('[SearchPC] Step 2 — product URL:', productHref);
    var resp2 = await fetch(CORS_PROXY + encodeURIComponent(productHref));
    console.log('[SearchPC] Product page status:', resp2.status);
    if (!resp2.ok) throw new Error('Product page HTTP ' + resp2.status);

    var html2 = await resp2.text();
    console.log('[SearchPC] Product HTML length:', html2.length);

    var doc2 = new DOMParser().parseFromString(html2, 'text/html');

    // Try price element IDs in preferred order: used → complete → loose
    var priceEl =
      doc2.getElementById('used_price') ||
      doc2.getElementById('complete_price') ||
      doc2.getElementById('loose_price');

    console.log('[SearchPC] Price element:', priceEl ? '#' + priceEl.id + ' = "' + priceEl.textContent.trim() + '"' : 'NOT FOUND');
    if (!priceEl) throw new Error('Price element not found on product page');

    var raw   = priceEl.textContent.replace(/[$,]/g, '').trim();
    var price = parseFloat(raw);
    console.log('[SearchPC] Parsed price:', price);
    if (!isFinite(price) || price <= 0) throw new Error('Invalid price "' + raw + '"');

    // Populate the field and trigger all downstream calculations
    priceInput.value = price.toFixed(2);
    row.price        = price.toFixed(2);
    updateRowCalcs(rowId);
    updateTotals();

    btn.textContent = 'Search PC';
    btn.disabled    = false;
  } catch (e) {
    console.error('[SearchPC] Failed:', e.message);
    err.textContent   = 'Not found \u2014 enter manually';
    err.style.display = 'block';
    btn.textContent   = 'Search PC';
    btn.disabled      = false;
  }
}

function onPctInput(colId, value) {
  var col = findCol(colId);
  if (col) col.pct = value;
  for (var i = 0; i < rows.length; i++) updateRowColCalc(rows[i].id, colId);
  updateTotals();
}

// ── Add / Remove % columns ────────────────────────────────────────────────────
function addPctCol() {
  var col = { id: nextColId++, pct: 70 };
  pctCols.push(col);

  var hdrAnchor = el('hdr-del-anchor');
  el('headerRow').insertBefore(buildColTh(col), hdrAnchor);

  var bodyRows = document.querySelectorAll('#tableBody tr');
  for (var i = 0; i < bodyRows.length; i++) {
    var rowId = parseInt(bodyRows[i].id.replace('row-', ''), 10);
    var delTd = bodyRows[i].querySelector('.c-del');
    bodyRows[i].insertBefore(buildOfferTd(col, rowId), delTd);
    updateRowColCalc(rowId, col.id);
  }

  var ftrAnchor = el('ftr-del-anchor');
  el('footerRow').insertBefore(buildFootColTd(col), ftrAnchor);

  updateTotals();
}

function removePctCol(colId) {
  if (pctCols.length <= 1) { alert('You must keep at least one % column.'); return; }
  var newCols = [];
  for (var i = 0; i < pctCols.length; i++) { if (pctCols[i].id !== colId) newCols.push(pctCols[i]); }
  pctCols = newCols;

  var dead = document.querySelectorAll('[data-colid="' + colId + '"]');
  for (var j = 0; j < dead.length; j++) dead[j].parentNode.removeChild(dead[j]);

  updateTotals();
}

// ── Add / Delete rows ─────────────────────────────────────────────────────────
function addRow(data) {
  var row = data || { id: nextId++, item: '', qty: '1', price: '' };
  if (!data) rows.push(row);
  var tr = buildRow(row);
  el('tableBody').appendChild(tr);
  updateRowCalcs(row.id);
  updateTotals();
}

function deleteRow(id) {
  var newRows = [];
  for (var i = 0; i < rows.length; i++) { if (rows[i].id !== id) newRows.push(rows[i]); }
  rows = newRows;
  var tr = el('row-' + id);
  if (tr) tr.parentNode.removeChild(tr);
  updateTotals();
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function saveSession() {
  var data = { pctCols: pctCols, rows: rows };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'pokemon-lot-comp-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadSession(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var data = JSON.parse(ev.target.result);

      // Clear rows
      rows = []; nextId = 1;
      el('tableBody').innerHTML = '';

      // Remove existing dynamic columns from header and footer
      var oldCols = document.querySelectorAll('[data-colid]');
      for (var i = 0; i < oldCols.length; i++) oldCols[i].parentNode.removeChild(oldCols[i]);

      // Restore pct columns
      pctCols = []; nextColId = 1;
      var savedCols = Array.isArray(data.pctCols) ? data.pctCols : [];
      // Legacy support: old format used pct1/pct2/pct3
      if (savedCols.length === 0 && (data.pct1 != null || data.pct2 != null || data.pct3 != null)) {
        if (data.pct1 != null) savedCols.push({ id: 1, pct: data.pct1 });
        if (data.pct2 != null) savedCols.push({ id: 2, pct: data.pct2 });
        if (data.pct3 != null) savedCols.push({ id: 3, pct: data.pct3 });
      }
      if (savedCols.length === 0) savedCols = [{ id: 1, pct: 85 }, { id: 2, pct: 75 }, { id: 3, pct: 65 }];

      var hdrAnchor = el('hdr-del-anchor');
      var ftrAnchor = el('ftr-del-anchor');
      for (var c = 0; c < savedCols.length; c++) {
        var col = savedCols[c];
        if (col.id >= nextColId) nextColId = col.id + 1;
        pctCols.push(col);
        el('headerRow').insertBefore(buildColTh(col), hdrAnchor);
        el('footerRow').insertBefore(buildFootColTd(col), ftrAnchor);
      }

      // Restore rows
      if (Array.isArray(data.rows)) {
        for (var r = 0; r < data.rows.length; r++) {
          var row = data.rows[r];
          if (row.id == null) row.id = nextId++;
          else if (row.id >= nextId) nextId = row.id + 1;
          rows.push(row);
          el('tableBody').appendChild(buildRow(row));
          updateRowCalcs(row.id);
        }
      }
      updateTotals();
    } catch (err) {
      alert('Failed to load session: invalid or corrupted JSON file.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── PDF Export (uses browser print dialog — save as PDF) ─────────────────────
function exportPDF() {
  window.print();
}

// ── Clear All ─────────────────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear all rows? This cannot be undone.')) return;
  rows = []; nextId = 1;
  el('tableBody').innerHTML = '';
  updateTotals();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  var hdrAnchor = el('hdr-del-anchor');
  var ftrAnchor = el('ftr-del-anchor');
  for (var i = 0; i < pctCols.length; i++) {
    el('headerRow').insertBefore(buildColTh(pctCols[i]), hdrAnchor);
    el('footerRow').insertBefore(buildFootColTd(pctCols[i]), ftrAnchor);
  }
  addRow(); addRow(); addRow();
})();
</script>
</body>
</html>
